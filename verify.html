<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Verification | Vacch</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #764ba2; }
        button { width: 100%; padding: 12px; background-color: #6c63ff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #5149d1; }
        #recaptcha-container { margin: 15px 0; }
        .hidden { display: none; }
        #message { margin-top: 15px; font-size: 14px; color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <h2>Phone Auth</h2>
    
    <div id="step1">
        <input type="tel" id="phoneNumber" placeholder="+91 9876543210">
        <div id="recaptcha-container"></div>
        <button onclick="onSignInSubmit()">Send OTP</button>
    </div>

    <div id="step2" class="hidden">
        <input type="text" id="verificationCode" placeholder="Enter 6-digit OTP">
        <button onclick="verifyCode()">Verify & Login</button>
    </div>

    <p id="message"></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

<script src="src/firebase.js"></script>

<script>
    // reCAPTCHA setup
    window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        'size': 'normal'
    });

    function onSignInSubmit() {
        const number = document.getElementById('phoneNumber').value;
        const appVerifier = window.recaptchaVerifier;

        firebase.auth().signInWithPhoneNumber(number, appVerifier)
            .then((confirmationResult) => {
                window.confirmationResult = confirmationResult;
                document.getElementById('step1').classList.add('hidden');
                document.getElementById('step2').classList.remove('hidden');
                document.getElementById('message').innerText = "OTP Sent!";
                document.getElementById('message').style.color = "green";
            }).catch((error) => {
                document.getElementById('message').innerText = "Error: " + error.message;
            });
    }

    function verifyCode() {
        const code = document.getElementById('verificationCode').value;
        confirmationResult.confirm(code).then((result) => {
            const user = result.user;
            document.getElementById('message').innerText = "Login Successful!";
            document.getElementById('message').style.color = "green";
            // Redirect user or show Gemini UI here
        }).catch((error) => {
            document.getElementById('message').innerText = "Invalid OTP. Try again.";
        });
    }
</script>

</body>
</html>
